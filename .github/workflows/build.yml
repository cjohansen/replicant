name: build

on:
  push:
    paths-ignore:
      - "dev/**"
      - "dev-resources/**"
    branches:
      - main
  pull_request:
    paths-ignore:
      - "dev/**"
      - "dev-resources/**"
    branches:
      - main

jobs:
  run-tests:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Cache deps
        uses: actions/cache@v5
        id: cache-deps
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-${{ runner.arch }}-deps-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-deps

      - name: Prepare java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.5.1654
          bb: latest

      - name: Run tests
        run: |
          bin/kaocha

      - name: Run cljs tests
        run: bb test:cljs

      - name: Run babashka tests
        run: bb test:bb

      - name: Run squint tests
        run: bb test:squint
